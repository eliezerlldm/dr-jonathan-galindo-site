document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

kground:#F3F9F0;border:1px solid #DDEBD3;color:#3D8A24\">Preguntar por WhatsApp<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== CHAT ASISTENTE ===================== -->\n  <div style=\"position:fixed;right:22px;bottom:22px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:14px\">\n    <sc-if value=\"{{ chatOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:min(360px,calc(100vw - 44px));background:#fff;border:1px solid #E3E9F2;border-radius:20px;overflow:hidden;box-shadow:0 30px 70px rgba(9,24,56,.3);animation:chatIn .3s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"padding:16px 18px;background:#1B449C;display:flex;align-items:center;gap:12px\">\n          <div style=\"width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:'PT Sans';font-weight:700;color:#fff\">JG<\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font-weight:700;font-size:15px;color:#fff\">Asistente · Dr. Galindo<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#7CE08A\"><\u002Fspan>En línea<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ toggleChat }}\" style=\"background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div ref=\"{{ chatScroll }}\" style=\"max-height:320px;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:#F6F9FD\">\n          <sc-for list=\"{{ chatMsgs }}\" as=\"msg\" hint-placeholder-count=\"1\">\n            <div style=\"{{ msg.wrap }}\">\n              <div style=\"{{ msg.bubble }}\">{{ msg.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:12px 16px 16px;border-top:1px solid #EAEFF6;background:#fff\">\n          <div style=\"font-size:11.5px;color:#8A97AD;text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px\">Preguntas rápidas<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <sc-for list=\"{{ quickReplies }}\" as=\"q\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ q.onSelect }}\" style=\"padding:9px 13px;background:#F2F6FC;border:1px solid rgba(27,68,156,.25);border-radius:100px;color:#1B449C;font:inherit;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:rgba(27,68,156,.08)\">{{ q.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{ toggleChat }}\" style=\"width:60px;height:60px;border-radius:50%;border:none;background:#1B449C;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 14px 34px rgba(27,68,156,.4);animation:pulseRing 2.6s ease-out infinite;display:flex;align-items:center;justify-content:center\">{{ chatIcon }}<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    navSolid: false,\n    step: 1,\n    loc: null,\n    motivo: null,\n    zones: [],\n    date: null,\n    time: null,\n    name: '',\n    phone: '',\n    notes: '',\n    error: '',\n    booked: false,\n    chatOpen: false,\n    chatMsgs: [{ from: 'bot', text: '¡Hola! Soy el asistente del Dr. Jona Galindo 👋 ¿En qué puedo ayudarte hoy?' }],\n    modal: null,\n  };\n\n  SERVICES = [\n    { num: '01', title: 'Artroscopía', type: 'Cirugía mínimamente invasiva', desc: 'Para tratar problemas dentro de la articulación: rodilla, cadera y hombro.',\n      long: 'Técnica de mínima invasión en la que, a través de pequeñas incisiones, se introduce una cámara (artroscopio) para ver y reparar el interior de la articulación sin necesidad de abrirla por completo. Menos dolor, menos cicatriz y recuperación más rápida.',\n      signs: ['Dolor articular persistente que no mejora con reposo o medicamento', 'Lesiones de menisco, cartílago o manguito rotador', 'Bloqueos, chasquidos o sensación de inestabilidad en la articulación'],\n      recovery: '2 – 6 semanas', anesthesia: 'Regional / general' },\n    { num: '02', title: 'Reparación de tejidos blandos', type: 'Cirugía reconstructiva', desc: 'Para ligamentos y tendones desgarrados.',\n      long: 'Reconstrucción y sutura de ligamentos, tendones y músculos que se han desgarrado por trauma o sobreuso deportivo. Devuelve la estabilidad y la fuerza a la articulación para que puedas volver a tu actividad.',\n      signs: ['Ruptura de ligamento cruzado (LCA) o tendón de Aquiles', 'Inestabilidad al apoyar o pérdida de fuerza', 'Lesiones deportivas por torsión o impacto'],\n      recovery: '3 – 6 meses', anesthesia: 'Regional / general' },\n    { num: '03', title: 'Reemplazo articular', type: 'Prótesis articular', desc: 'Cuando una articulación dañada se reemplaza con una prótesis.',\n      long: 'Cuando el desgaste articular es severo, la articulación dañada se sustituye por una prótesis diseñada a tu anatomía. Elimina el dolor crónico y restaura el movimiento en rodilla y cadera, principalmente.',\n      signs: ['Artrosis avanzada con dolor incluso en reposo', 'Rigidez que limita caminar, subir escaleras o dormir', 'Desgaste que ya no responde a tratamiento conservador'],\n      recovery: '2 – 3 meses', anesthesia: 'Regional / general' },\n    { num: '04', title: 'Cirugía articular de revisión', type: 'Recambio de implante', desc: 'Reemplazo de un implante preexistente por uno nuevo.',\n      long: 'Sustitución de una prótesis previa que se ha desgastado, aflojado o infectado, por un nuevo implante. Recupera la función y elimina el dolor derivado de un implante que llegó al final de su vida útil.',\n      signs: ['Prótesis previa con dolor, aflojamiento o desgaste', 'Sensación de inestabilidad en una articulación ya operada', 'Infección o rechazo del implante existente'],\n      recovery: '2 – 4 meses', anesthesia: 'General' },\n    { num: '05', title: 'Reparación de fracturas', type: 'Osteosíntesis', desc: 'Reposicionamiento con placas, tornillos o clavos según el caso.',\n      long: 'Reposicionamiento y fijación de huesos fracturados mediante placas, tornillos o clavos para que consoliden en la posición correcta. Fundamental en urgencias para una recuperación funcional completa.',\n      signs: ['Fractura por caída, accidente o impacto deportivo', 'Hueso desplazado o expuesto que requiere fijación', 'Dolor intenso e incapacidad para mover o apoyar'],\n      recovery: '6 – 12 semanas', anesthesia: 'Según fractura' },\n    { num: '06', title: 'Desbridamiento', type: 'Limpieza quirúrgica', desc: 'Eliminación de tejidos blandos u óseos dañados por infección o fractura.',\n      long: 'Eliminación controlada del tejido dañado, infectado o muerto —blando u óseo— para favorecer una cicatrización sana. Frecuente tras infecciones o fracturas complejas.',\n      signs: ['Herida o fractura con signos de infección', 'Tejido muerto que impide la cicatrización', 'Necesidad de preparar la zona para otra cirugía'],\n      recovery: '2 – 4 semanas', anesthesia: 'Local / regional' },\n    { num: '07', title: 'Fusión de huesos', type: 'Injerto óseo', desc: 'Fusión de huesos con injertos cuando se requiere.',\n      long: 'Unión de dos huesos mediante injerto para estabilizar una zona dañada o que no consolidó por sí sola. Elimina el movimiento doloroso y crea una estructura sólida y permanente.',\n      signs: ['Fractura que no consolidó (pseudoartrosis)', 'Inestabilidad ósea crónica', 'Deformidad que requiere estabilización definitiva'],\n      recovery: '3 – 6 meses', anesthesia: 'General' },\n    { num: '08', title: 'Fusión de columna', type: 'Cirugía de columna', desc: 'Unión de los huesos de la columna (vértebras).',\n      long: 'Unión de dos o más vértebras para estabilizar la columna y eliminar el dolor causado por movimiento entre segmentos dañados. Indicada en casos seleccionados tras estudio detallado.',\n      signs: ['Dolor lumbar o cervical crónico e incapacitante', 'Inestabilidad vertebral o hernias severas', 'Dolor que irradia a piernas o brazos sin mejorar'],\n      recovery: '3 – 6 meses', anesthesia: 'General' },\n    { num: '09', title: 'Osteotomía', type: 'Corrección de alineación', desc: 'Dirigida a corregir deformidades óseas.',\n      long: 'Corte y realineación controlada del hueso para corregir deformidades o redistribuir la carga en una articulación. Permite retrasar o evitar un reemplazo articular en pacientes jóvenes y activos.',\n      signs: ['Piernas arqueadas o desviación que sobrecarga la rodilla', 'Desgaste localizado en una sola zona de la articulación', 'Deformidad ósea que causa dolor al caminar'],\n      recovery: '3 – 6 meses', anesthesia: 'Regional / general' },\n  ];\n\n  LOCATIONS = [\n    { id: 'mexamer', name: 'Hospital México Americano', addr: 'C. Colomos 2113, Ayuntamiento' },\n    { id: 'siloe', name: 'Hospital Siloé', addr: 'Ramón López Velarde 3843' },\n  ];\n  MOTIVOS = ['Lesión deportiva', 'Dolor articular', 'Fractura / urgencia', 'Revisión y seguimiento', 'Plantillas personalizadas', 'Segunda opinión'];\n  ZONES = ['Rodilla', 'Hombro', 'Cadera', 'Columna', 'Tobillo / pie', 'Codo / muñeca', 'Mano', 'Otra'];\n  TIMES = ['09:00', '10:00', '11:00', '12:00', '16:00', '17:00', '18:00'];\n  DOW = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];\n  MON = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];\n\n  componentDidMount() {\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12 });\n    this._co = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) { this.animateCount(e.target); this._co.unobserve(e.target); }\n      });\n    }, { threshold: 0.5 });\n    this._scan();\n    this._onScroll = () => {\n      const solid = window.scrollY > 40;\n      if (solid !== this.state.navSolid) this.setState({ navSolid: solid });\n      this._applyNav(solid);\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._applyNav(false);\n  }\n  componentDidUpdate() { this._scan(); this._scrollChat(); }\n  componentWillUnmount() { window.removeEventListener('scroll', this._onScroll); }\n\n  _scan() {\n    document.querySelectorAll('[data-reveal]').forEach((el) => { if (!el._rvd) { el._rvd = 1; this._io.observe(el); } });\n    document.querySelectorAll('[data-count]').forEach((el) => { if (!el._cvd) { el._cvd = 1; this._co.observe(el); } });\n  }\n  _applyNav(solid) {\n    if (!this._nav) return;\n    if (solid) {\n      this._nav.style.background = 'rgba(255,255,255,.92)';\n      this._nav.style.backdropFilter = 'blur(14px)';\n      this._nav.style.boxShadow = '0 6px 24px rgba(22,41,79,.08)';\n      this._nav.style.paddingTop = '11px';\n      this._nav.style.paddingBottom = '11px';\n    } else {\n      this._nav.style.background = 'transparent';\n      this._nav.style.backdropFilter = 'none';\n      this._nav.style.boxShadow = 'none';\n      this._nav.style.paddingTop = '16px';\n      this._nav.style.paddingBottom = '16px';\n    }\n  }\n  animateCount(el) {\n    const target = parseFloat(el.getAttribute('data-count'));\n    const suffix = el.getAttribute('data-suffix') || '';\n    const dur = 1400; const start = performance.now();\n    const tick = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - p, 3);\n      const val = Math.round(target * eased);\n      el.textContent = (target >= 1000 ? val.toLocaleString('es-MX') : val) + suffix;\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n  _scrollChat() {\n    if (this._chatScroll) this._chatScroll.scrollTop = this._chatScroll.scrollHeight;\n  }\n\n  chipStyle(sel, block) {\n    const base = 'font:inherit;font-size:15px;cursor:pointer;border-radius:12px;transition:all .18s;' + (block ? 'width:100%;text-align:left;padding:18px 20px;' : 'padding:12px 16px;');\n    if (sel) return base + 'border:1px solid #1B449C;background:rgba(27,68,156,.08);color:#1B449C;box-shadow:0 0 0 1px #1B449C inset;font-weight:700;';\n    return base + 'border:1px solid #D8E0EE;background:#fff;color:#33456B;';\n  }\n  dayStyle(sel) {\n    const base = 'font:inherit;cursor:pointer;border-radius:14px;padding:12px 4px;min-width:66px;text-align:center;transition:all .18s;flex:none;';\n    if (sel) return base + 'border:1px solid #1B449C;background:rgba(27,68,156,.08);box-shadow:0 0 0 1px #1B449C inset;';\n    return base + 'border:1px solid #D8E0EE;background:#fff;';\n  }\n\n  buildDays() {\n    const out = []; const d = new Date(); d.setHours(0, 0, 0, 0);\n    while (out.length < 8) {\n      d.setDate(d.getDate() + 1);\n      const dow = d.getDay();\n      if (dow === 0 || dow === 6) continue;\n      out.push({ iso: d.toISOString().slice(0, 10), dow: this.DOW[dow], day: String(d.getDate()), mon: this.MON[d.getMonth()], full: `${this.DOW[dow]} ${d.getDate()} ${this.MON[d.getMonth()]}` });\n    }\n    return out;\n  }\n\n  next = () => {\n    const s = this.state;\n    if (s.step === 1 && !s.loc) { this.setState({ error: 'Elige un consultorio.' }); return; }\n    if (s.step === 2 && !s.motivo) { this.setState({ error: 'Selecciona el motivo de tu consulta.' }); return; }\n    if (s.step === 3 && (!s.date || !s.time)) { this.setState({ error: 'Elige fecha y horario.' }); return; }\n    if (s.step === 4) {\n      if (!s.name.trim() || s.phone.replace(/\\D/g, '').length < 8) { this.setState({ error: 'Escribe tu nombre y un teléfono válido.' }); return; }\n      this.setState({ booked: true, error: '' }); return;\n    }\n    this.setState({ step: s.step + 1, error: '' });\n  };\n  back = () => {\n    if (this.state.step > 1) this.setState({ step: this.state.step - 1, error: '' });\n  };\n  reset = () => this.setState({ step: 1, loc: null, motivo: null, zones: [], date: null, time: null, name: '', phone: '', notes: '', booked: false, error: '' });\n\n  toggleZone(z) {\n    const has = this.state.zones.includes(z);\n    this.setState({ zones: has ? this.state.zones.filter((x) => x !== z) : [...this.state.zones, z] });\n  }\n\n  openService = (svc) => { this.setState({ modal: svc }); };\n  closeService = () => this.setState({ modal: null });\n  bookService = (svc) => {\n    const map = { '01': 'Lesión deportiva', '02': 'Lesión deportiva', '05': 'Fractura / urgencia' };\n    this.setState({ modal: null, motivo: map[svc.num] || 'Revisión y seguimiento', step: 2 });\n    requestAnimationFrame(() => { const el = document.querySelector('#citas'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 20, behavior: 'smooth' }); });\n  };\n\n  toggleChat = () => this.setState({ chatOpen: !this.state.chatOpen });\n  sendQuick(q) {\n    const replies = {\n      'Agendar una cita': 'Perfecto 📅 Puedes agendar en la sección \"Agenda tu consulta\" aquí arriba, o te confirmo por WhatsApp al (33) 2274 0493.',\n      '¿Atienden urgencias?': 'Sí, atendemos urgencias las 24 horas. Llama al (33) 2274 0493 y te orientamos de inmediato.',\n      'Plantillas personalizadas': 'Hacemos plantillas a la medida para deportistas, postura y más. ¿Te comparto info por WhatsApp?',\n      '¿Aceptan mi seguro?': 'Trabajamos con todas las aseguradoras y hacemos convenio aunque no esté en el listado. ¿Cuál tienes?',\n      'Ubicación de consultorios': 'Estamos en Hospital México Americano (Col. Colomos) y Hospital Siloé, ambos en Guadalajara.',\n    };\n    const bot = replies[q] || 'Con gusto te ayudo. Escríbenos por WhatsApp al (33) 2274 0493 para más detalles.';\n    this.setState({ chatMsgs: [...this.state.chatMsgs, { from: 'me', text: q }, { from: 'bot', text: bot }] });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const days = this.buildDays();\n    const locName = s.loc ? this.LOCATIONS.find((l) => l.id === s.loc).name : '—';\n    const dayObj = s.date ? days.find((d) => d.iso === s.date) : null;\n    const sumDate = dayObj ? dayObj.full : '—';\n    const zonesTxt = s.zones.length ? ' (' + s.zones.join(', ') + ')' : '';\n    const waText = `Hola Dr. Galindo, quiero agendar una cita.%0A%0A👤 ${s.name}%0A📞 ${s.phone}%0A🏥 ${locName}%0A📋 ${s.motivo || ''}${zonesTxt}%0A📅 ${sumDate} a las ${s.time || ''}%0A${s.notes ? '📝 ' + s.notes : ''}`;\n\n    return {\n      navRef: (el) => { this._nav = el; },\n      chatScroll: (el) => { this._chatScroll = el; },\n\n      services: this.SERVICES.map((svc) => ({ ...svc, onOpen: () => this.openService(svc) })),\n      modalOpen: !!s.modal,\n      modal: s.modal ? { ...s.modal, onBook: () => this.bookService(s.modal) } : {},\n      closeService: this.closeService,\n      stop: (e) => { e.stopPropagation(); },\n      reviews: [\n        { text: 'Excelente doctor, muy buena persona y demasiado acertado en sus diagnósticos. Me fracturé la rodilla y hoy está como si no hubiera pasado nada.', name: 'Juan Ramón Gálvez', when: 'Hace un año', initial: 'J' },\n        { text: 'Es un excelente doctor, gracias a él mi mamá salió adelante. Se preocupa mucho por sus pacientes. Lo recomiendo al 100%.', name: 'Gabriela Plascencia', when: 'Hace 5 años', initial: 'G' },\n        { text: 'Profesional y con calidez humana. Tuve una ruptura de tendón y me sacó adelante. Lo recomiendo ampliamente.', name: 'Javier Amigo', when: 'Hace 3 años', initial: 'J' },\n      ],\n      insurers: ['GNP', 'AXA', 'MetLife', 'Seguros Monterrey', 'Atlas', 'Mapfre', 'Plan Seguro', 'BUPA'],\n\n      step: s.step,\n      progressPct: (s.step / 4 * 100) + '%',\n      notBooked: !s.booked,\n      booked: s.booked,\n      isStep1: !s.booked && s.step === 1,\n      isStep2: !s.booked && s.step === 2,\n      isStep3: !s.booked && s.step === 3,\n      isStep4: !s.booked && s.step === 4,\n      hasError: !!s.error,\n      errorMsg: s.error,\n\n      locations: this.LOCATIONS.map((l) => ({ ...l, style: this.chipStyle(s.loc === l.id, true), onSelect: () => this.setState({ loc: l.id, error: '' }) })),\n      motivos: this.MOTIVOS.map((m) => ({ label: m, style: this.chipStyle(s.motivo === m, false), onSelect: () => this.setState({ motivo: m, error: '' }) })),\n      zones: this.ZONES.map((z) => ({ label: z, style: this.chipStyle(s.zones.includes(z), false), onSelect: () => this.toggleZone(z) })),\n      days: days.map((d) => ({ ...d, style: this.dayStyle(s.date === d.iso), onSelect: () => this.setState({ date: d.iso, error: '' }) })),\n      times: this.TIMES.map((t) => ({ label: t, style: this.chipStyle(s.time === t, false), onSelect: () => this.setState({ time: t, error: '' }) })),\n\n      fName: s.name, fPhone: s.phone, fNotes: s.notes,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onPhone: (e) => this.setState({ phone: e.target.value }),\n      onNotes: (e) => this.setState({ notes: e.target.value }),\n\n      sumLoc: locName,\n      sumMotivo: (s.motivo || '—') + zonesTxt,\n      sumDate,\n      sumTime: s.time || '—',\n      waHref: `https://api.whatsapp.com/send?phone=5213322740493&text=${waText}`,\n\n      next: this.next, back: this.back, reset: this.reset,\n      nextLabel: s.step === 4 ? 'Confirmar cita ✓' : 'Continuar →',\n      nextStyle: 'font:inherit;font-size:15.5px;font-weight:700;cursor:pointer;padding:15px 28px;border-radius:12px;border:none;background:#1B449C;color:#fff;box-shadow:0 10px 26px rgba(27,68,156,.3);',\n      backStyle: 'font:inherit;font-size:15px;font-weight:600;cursor:pointer;padding:15px 22px;border-radius:12px;border:1px solid #D8E0EE;background:#fff;color:' + (s.step === 1 ? '#B9C3D6' : '#33456B') + ';',\n\n      chatOpen: s.chatOpen,\n      chatIcon: s.chatOpen ? '✕' : '💬',\n      toggleChat: this.toggleChat,\n      chatMsgs: s.chatMsgs.map((m) => ({\n        text: m.text,\n        wrap: 'display:flex;justify-content:' + (m.from === 'me' ? 'flex-end' : 'flex-start'),\n        bubble: 'max-width:82%;padding:11px 14px;border-radius:15px;font-size:14px;line-height:1.5;' + (m.from === 'me' ? 'background:#1B449C;color:#fff;border-bottom-right-radius:5px;' : 'background:#fff;color:#33456B;border:1px solid #E3E9F2;border-bottom-left-radius:5px;'),\n      })),\n      quickReplies: ['Agendar una cita', '¿Atienden urgencias?', 'Plantillas personalizadas', '¿Aceptan mi seguro?', 'Ubicación de consultorios'].map((q) => ({ label: q, onSelect: () => this.sendQuick(q) })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
